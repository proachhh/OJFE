<!DOCTYPE html>
<html>
<head>
  <title>OnlineJudge</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="renderer" content="webkit"/>
  <link rel="shortcut icon" href="/public/website/favicon.ico">

  <link href="/static/css/loader.css" rel="stylesheet">
  <style>
    /* 首页全屏背景图 */
    .home-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('/static/pictures/image.jpg') center center / cover no-repeat;
      z-index: 0;
      opacity: 1;
    }
    .home-background.hide {
      opacity: 0;
    }
    .home-background::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
      pointer-events: none;
    }
  </style>
  <script>
    // IE 10 and earlier
    if (window.navigator.userAgent.indexOf('MSIE ') > 0 &&
      window.confirm('Your browser is not supported, click \'OK\' to update')) {
      window.location = 'http://outdatedbrowser.com'
    }
  </script>
</head>
<body>
<!-- 首页背景图 - 全屏背景层 -->
<div id="home-bg" class="home-background"></div>
<div id="app-loader">
  <div class="square"></div>
  <div class="square"></div>
  <div class="square last"></div>
  <div class="square clear"></div>
  <div class="square"></div>
  <div class="square last"></div>
  <div class="square clear"></div>
  <div class="square "></div>
  <div class="square last"></div>
</div>

<div id="app"></div>
<!-- built files will be auto injected -->
</body>
</html>
